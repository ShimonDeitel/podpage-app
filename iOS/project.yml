name: Podpage
options:
  bundleIdPrefix: com.shimondeitel.podlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Podpage:
    type: application
    platform: iOS
    sources:
      - path: Podpage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.podlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Podpage/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PodpageTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PodpageTests
      - path: Podpage.storekit
    dependencies:
      - target: Podpage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.podlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PodpageUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PodpageUITests
    dependencies:
      - target: Podpage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.podlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Podpage:
    build:
      targets:
        Podpage: all
        PodpageTests: [test]
        PodpageUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Podpage.storekit
    test:
      config: Debug
      storeKitConfiguration: Podpage.storekit
      targets:
        - PodpageTests
        - PodpageUITests
    archive:
      config: Release
